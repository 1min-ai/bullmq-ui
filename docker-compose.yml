version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bullmq-studio:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://redis:6379}
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=production
      # Optional basic auth:
      # - BULLMQ_USERNAME=admin
      # - BULLMQ_PASSWORD=secret
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
