name: Build and Push Docker Image (Production)

on:
  workflow_dispatch:

concurrency:
  group: build-bullstudio-production
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push bullstudio image to ECR
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.9.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          provenance: false # https://github.com/docker/build-push-action/issues/755
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/ai-be-worker:bull-studio-production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            REDIS_URL=rediss://prod-valkey-cache-jjchiu.serverless.use1.cache.amazonaws.com:6379
            BULLSTUDIO_USERNAME=1minai
            BULLSTUDIO_PASSWORD=${{ secrets.BULLSTUDIO_PASSWORD }}
